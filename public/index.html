<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiShare</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>WiShare</h1>
  <p class="subtitle">Peer-to-peer file sharing</p>

  <div id="status" class="msg hidden"></div>

  <!-- Initial screen -->
  <div id="stepMode" class="card hidden">
    <div class="tabs">
      <button class="tab active" id="tabShare">Share</button>
      <button class="tab" id="tabRecv">Receive</button>
    </div>

    <!-- Share tab -->
    <div id="panelShare">
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📁</div>
        <p class="drop-text">Choose a file to share</p>
        <p class="or-text">or drag & drop</p>
        <input type="file" id="fileInput">
      </div>
    </div>

    <!-- Receive tab -->
    <div id="panelRecv" class="hidden">
      <p style="color:#8b8fa3;font-size:0.85rem;margin-bottom:10px">Enter the share code to receive a file</p>
      <div class="input-row">
        <input type="text" id="codeInput" class="code-input" placeholder="Enter code" maxlength="20" autocomplete="off">
        <button class="btn btn-primary" id="recvBtn" style="width:auto">Receive</button>
      </div>
    </div>
  </div>

  <!-- File info + Share -->
  <div id="stepFileInfo" class="card hidden">
    <div class="file-card">
      <span class="file-icon">📄</span>
      <div class="file-body">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
    </div>
    <button class="btn btn-primary" id="shareBtn">Share</button>
  </div>

  <!-- Share code + QR -->
  <div id="stepCode" class="card hidden">
    <p class="code-label">Share this code <span style="color:#555;font-size:0.75rem">(tap to copy)</span></p>
    <div class="code-big" id="codeDisplay">---</div>
    <div class="qr-wrap" id="qrContainer"></div>
    <p style="color:#8b8fa3;font-size:0.8rem;text-align:center">Or scan the QR code</p>
    <button class="btn btn-sm mt-8" id="cancelShare" style="width:100%">Cancel</button>
  </div>

  <!-- Progress -->
  <div id="progressWrap" class="card hidden">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Preparing...</div>
  </div>

  <!-- Done -->
  <div id="stepDone" class="card hidden">
    <div class="file-card">
      <span class="file-icon">📥</span>
      <div class="file-body">
        <div class="file-name" id="recvName"></div>
        <div class="file-size" id="recvSize"></div>
      </div>
      <a class="dl-btn" id="recvDownload" download>Download</a>
    </div>
    <button class="btn btn-primary mt-8" id="shareAgain">Share Another</button>
  </div>

  <footer>Direct P2P &bull; WebRTC &bull; No server</footer>
</div>

<script src="peerjs.min.js"></script>
<script src="qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
