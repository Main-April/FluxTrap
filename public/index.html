<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiShare</title>
<script src="qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f1117; color: #e4e6f0;
  display: flex; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.container { max-width: 480px; width: 100%; text-align: center; }
h1 {
  font-size: 2rem; margin: 20px 0 4px;
  background: linear-gradient(135deg, #6c5ce7, #00cec9);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { color: #8b8fa3; font-size: 0.9rem; margin-bottom: 24px; }
.card { background: #1a1d2e; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.drop-zone {
  border: 2px dashed #2a2e42; border-radius: 12px; padding: 40px 20px;
  cursor: pointer; transition: all 0.2s;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: #6c5ce7; background: rgba(108,92,231,0.08); }
.drop-icon { font-size: 2.5rem; margin-bottom: 8px; }
.drop-text { color: #8b8fa3; font-size: 1rem; margin-bottom: 4px; }
.or-text { color: #555; font-size: 0.85rem; margin: 6px 0; }
.btn {
  display: inline-block; padding: 10px 20px; border: none; border-radius: 8px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  background: #2a2e42; color: #e4e6f0;
}
.btn-primary { background: #6c5ce7; color: #fff; width: 100%; margin-top: 16px; }
.btn-primary:hover { background: #7f71ea; }
.btn-primary:disabled { opacity: 0.5; cursor: default; }
#fileInput { display: none; }
.file-info {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: #0f1117; border-radius: 8px; margin-bottom: 12px; text-align: left;
}
.file-icon { font-size: 1.5rem; }
.file-details { flex: 1; min-width: 0; }
.file-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 0.8rem; color: #8b8fa3; }
.progress-bar { height: 8px; background: #0f1117; border-radius: 4px; overflow: hidden; margin-top: 12px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #6c5ce7, #00cec9); width: 0%; transition: width 0.3s; border-radius: 4px; }
.qr-wrap { padding: 16px 0; }
#qrcode { padding: 12px; background: #fff; border-radius: 8px; display: inline-block; }
.qr-hint { color: #8b8fa3; font-size: 0.85rem; margin-top: 8px; word-break: break-all; }
.hidden { display: none !important; }
.status { color: #8b8fa3; font-size: 0.9rem; padding: 12px; }
.dl-link {
  display: block; margin-top: 8px;
  color: #6c5ce7; font-size: 0.85rem; word-break: break-all;
}
footer { font-size: 0.75rem; color: #8b8fa3; opacity: 0.6; }
.error-box {
  padding: 12px; border-radius: 8px; background: rgba(231,76,60,0.1);
  color: #e74c3c; font-size: 0.85rem; margin-top: 12px;
}
</style>
</head>
<body>
<div class="container">
  <h1>WiShare</h1>
  <p class="subtitle">Drop a file, share the QR code</p>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📁</div>
      <p class="drop-text">Drag & drop a file</p>
      <p class="or-text">or</p>
      <button class="btn" id="browseBtn">Browse</button>
      <input type="file" id="fileInput">
    </div>

    <div id="uploadSection" class="hidden">
      <div class="file-info">
        <span class="file-icon">📄</span>
        <div class="file-details">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>
      </div>
      <button class="btn btn-primary" id="shareBtn">Generate QR Code</button>
      <div class="progress-bar hidden" id="progressWrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="error-box hidden" id="errorMsg"></div>
    </div>

    <div id="qrSection" class="hidden">
      <div class="qr-wrap" id="qrContainer"></div>
      <p class="qr-hint" id="qrHint">Scan with your phone to download</p>
      <a class="dl-link hidden" id="dlLink" target="_blank">Open link</a>
    </div>

    <div id="statusMsg" class="status hidden"></div>
  </div>

  <footer>Powered by tmpfiles.org &bull; Files expire after 1 hour</footer>
</div>

<script>
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var browseBtn = document.getElementById('browseBtn');
var uploadSection = document.getElementById('uploadSection');
var fileName = document.getElementById('fileName');
var fileSize = document.getElementById('fileSize');
var shareBtn = document.getElementById('shareBtn');
var progressWrap = document.getElementById('progressWrap');
var progressFill = document.getElementById('progressFill');
var qrSection = document.getElementById('qrSection');
var qrContainer = document.getElementById('qrContainer');
var qrHint = document.getElementById('qrHint');
var dlLink = document.getElementById('dlLink');
var statusMsg = document.getElementById('statusMsg');
var errorMsg = document.getElementById('errorMsg');

var selectedFile = null;

function fmtSize(bytes) {
  if (bytes === 0) return '0 B';
  var k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
  var i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }

function setError(text) {
  errorMsg.textContent = text;
  show(errorMsg);
}
function clearError() { hide(errorMsg); }

function selectFile(file) {
  if (file.size > 100 * 1024 * 1024) {
    alert('File too large (max 100 MB)');
    return;
  }
  selectedFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = fmtSize(file.size);
  hide(dropZone);
  hide(qrSection);
  hide(dlLink);
  show(uploadSection);
  hide(progressWrap);
  clearError();
}

var UPLOAD_SERVICE = {
  url: 'https://tmpfiles.org/api/v1/upload',
  parse: function (r) {
    if (r.status === 'success' && r.data && r.data.url) {
      return r.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
    }
    return null;
  }
};

function uploadFile() {
  if (!selectedFile) return;
  shareBtn.disabled = true;
  shareBtn.textContent = 'Uploading...';
  show(progressWrap);
  clearError();

  var formData = new FormData();
  formData.append('file', selectedFile);

  var xhr = new XMLHttpRequest();

  xhr.upload.onprogress = function (e) {
    if (e.lengthComputable) {
      progressFill.style.width = Math.min(90, (e.loaded / e.total * 100)) + '%';
    }
  };

  xhr.onload = function () {
    try {
      var result = JSON.parse(xhr.responseText);
      var url = UPLOAD_SERVICE.parse(result);
      if (url) {
        progressFill.style.width = '100%';
        showQRCode(url);
        return;
      }
    } catch (e) {}
    setError('Upload failed. Try again.');
    shareBtn.disabled = false;
    shareBtn.textContent = 'Generate QR Code';
    hide(progressWrap);
  };

  xhr.onerror = function () {
    setError('Network error. Check your connection.');
    shareBtn.disabled = false;
    shareBtn.textContent = 'Generate QR Code';
    hide(progressWrap);
  };

  xhr.open('POST', UPLOAD_SERVICE.url);
  xhr.send(formData);
}

function showQRCode(url) {
  hide(uploadSection);
  hide(progressWrap);
  show(qrSection);
  qrHint.textContent = 'Scan with your phone to download';
  dlLink.href = url;
  dlLink.textContent = url;
  show(dlLink);

  qrContainer.innerHTML = '';
  new QRCode(qrContainer, {
    text: url,
    width: 200,
    height: 200,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}

browseBtn.addEventListener('click', function () { fileInput.click(); });
dropZone.addEventListener('click', function () { fileInput.click(); });
dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', function (e) {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function () {
  if (fileInput.files.length) selectFile(fileInput.files[0]);
});
shareBtn.addEventListener('click', uploadFile);
</script>
</body>
</html>
