<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiShare</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>WiShare</h1>
  <p class="subtitle">Encrypted file sharing via QR code</p>

  <div id="status" class="msg hidden"></div>

  <div id="stepSelect" class="card hidden">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📁</div>
      <p class="drop-text">Tap to choose a file</p>
      <p class="or-text">or drag & drop</p>
      <button class="btn" id="browseBtn">Browse</button>
      <input type="file" id="fileInput">
    </div>
  </div>

  <div id="stepUpload" class="card hidden">
    <div class="file-card">
      <span class="file-icon">📄</span>
      <div class="file-body">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
    </div>
    <button class="btn btn-primary" id="shareBtn">Encrypt & Generate QR Code</button>
    <div id="progressWrap" class="hidden">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Preparing...</div>
    </div>
  </div>

  <div id="stepQR" class="card hidden">
    <div class="qr-wrap" id="qrContainer"></div>
    <p id="qrHint">Scan with any phone to download</p>
    <a id="dlLink" class="dl-link" target="_blank">Open download page</a>
  </div>

  <div id="stepDone" class="card hidden">
    <div id="recvProgress" class="hidden">
      <div class="progress-bar"><div class="progress-fill" id="recvFill"></div></div>
      <div class="progress-text" id="recvText">Downloading...</div>
    </div>
    <div id="recvCard" class="file-card hidden">
      <span class="file-icon">📥</span>
      <div class="file-body">
        <div class="file-name" id="recvName"></div>
        <div class="file-size" id="recvSize"></div>
      </div>
      <a class="dl-btn" id="recvDownload" download>Download</a>
    </div>
    <button class="btn btn-primary mt-8" id="shareAgain">Share a File</button>
  </div>

  <footer>
    AES-256-GCM &bull; Encrypted before upload &bull; tmpfiles.org
  </footer>
</div>

<script src="qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
