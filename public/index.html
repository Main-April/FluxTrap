<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiShare — Share files P2P</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <header>
    <div class="header-inner">
      <span class="logo"><i class="fa-solid fa-wifi"></i> WiShare</span>
      <span class="tagline">encrypted P2P</span>
    </div>
  </header>

  <main>
    <div id="status"></div>

    <div class="tabs">
      <button class="tab active" id="tabShare"><i class="fa-solid fa-arrow-up-from-bracket"></i> Share</button>
      <button class="tab" id="tabRecv"><i class="fa-solid fa-arrow-down-to-bracket"></i> Receive</button>
    </div>

    <!-- ── SHARE ── -->
    <div id="panelShare">

      <div id="stepDrop" class="drop-zone">
        <div class="drop-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
        <h3>Select a file to share</h3>
        <p class="muted">or drag &amp; drop here</p>
        <input type="file" id="fileInput" hidden>
        <button class="btn primary" id="pickBtn"><i class="fa-solid fa-folder-open"></i> Browse</button>
        <div class="pill-row">
          <span><i class="fa-solid fa-lock"></i> Encrypted</span>
          <span><i class="fa-solid fa-bolt"></i> P2P</span>
          <span><i class="fa-solid fa-clock"></i> Up to 500 MB</span>
        </div>
      </div>

      <div id="stepShare" class="card hidden">
        <div class="card-icon"><i class="fa-solid fa-circle-check"></i></div>
        <div class="code-box" id="codeDisplay">------</div>
        <p class="muted">Share this code <span class="copy-hint" id="copyHint">— tap to copy</span></p>
        <div id="qrContainer" class="qr-wrap"></div>
        <div class="btn-row">
          <button class="btn ghost" id="cancelShare"><i class="fa-solid fa-xmark"></i> Cancel</button>
        </div>
      </div>

    </div>

    <!-- ── RECEIVE ── -->
    <div id="panelRecv" hidden>
      <div class="recv-box">
        <p class="muted" style="margin-bottom:12px">Enter the share code</p>
        <input type="text" id="codeInput" class="code-input" placeholder="e.g. abc123" maxlength="20" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="btn primary" id="recvBtn" style="width:100%;margin-top:12px"><i class="fa-solid fa-arrow-down-to-bracket"></i> Receive</button>
      </div>
    </div>

    <!-- ── PROGRESS (shared) ── -->
    <div id="progressWrap" class="card hidden">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="muted" id="progressText">Preparing...</p>
    </div>

    <!-- ── DONE (shared) ── -->
    <div id="stepDone" class="card hidden">
      <div class="card-icon"><i class="fa-solid fa-check"></i></div>
      <p style="font-weight:600;font-size:1.1rem" id="recvName"></p>
      <p class="muted" id="recvSize"></p>
      <div class="btn-row">
        <a class="btn primary" id="recvDownload" download hidden><i class="fa-solid fa-download"></i> Download</a>
        <button class="btn ghost" id="shareAgain"><i class="fa-solid fa-arrow-rotate-left"></i> New transfer</button>
      </div>
    </div>

  </main>

  <footer>
    <span class="muted">WiShare &middot; direct P2P &middot; no server</span>
  </footer>

</div>

<script src="peerjs.min.js"></script>
<script src="qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
